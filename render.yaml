version: "1"
services:
  - type: web
    name: bioutn-api
    env: docker
    dockerfilePath: ./Dockerfile.API
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bioutn-db
          property: connectionString
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

  - type: web
    name: bioutn-mvc
    env: docker
    dockerfilePath: ./Dockerfile.MVC
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: API_BASE_URL
        value: "https://bioutn-api.onrender.com/api" # Cambiar esto si Render asigna otra URL

databases:
  - name: bioutn-db
    plan: free
    databaseName: bioutn
    user: bioutn_user
